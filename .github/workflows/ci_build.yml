name: CI

on:
        push:
                branches: [main]
        pull_request:
                branches: [main]

jobs:
        linux:
                runs-on: ubuntu-24.04
                steps:
                        - uses: actions/checkout@v6.0.2
                          with:
                                  fetch-depth: 1

                        - name: Install dependencies
                          run: |
                                  sudo apt-get update
                                  sudo apt-get install -y python3

                        - name: Install Zig
                          run: |
                                  curl -fsSL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz | sudo tar -xJ -C /usr/local
                                  sudo ln -s /usr/local/zig-x86_64-linux-0.15.2/zig /usr/local/bin/zig

                        - name: Install premake5
                          run: |
                                  curl -fsSL https://github.com/premake/premake-core/releases/download/v5.0.0-beta4/premake-5.0.0-beta4-linux.tar.gz | sudo tar -xz -C /usr/local/bin
                                  sudo chmod +x /usr/local/bin/premake5

                        - name: Cache wasmtime
                          uses: actions/cache@v5.0.5
                          with:
                                  path: vendor/wasmtime
                                  key: wasmtime-v45.0.0-x86_64-musl

                        - name: Build
                          run: .github/workflows/ci/build_linux.sh
